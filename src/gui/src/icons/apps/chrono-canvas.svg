<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Background -->
  <rect width="48" height="48" rx="8" fill="#2196F3"/>
  
  <!-- Canvas grid -->
  <g fill="none" stroke="#fff" stroke-width="1" opacity="0.6">
    <line x1="12" y1="12" x2="36" y2="12"/>
    <line x1="12" y1="18" x2="36" y2="18"/>
    <line x1="12" y1="24" x2="36" y2="24"/>
    <line x1="12" y1="30" x2="36" y2="30"/>
    <line x1="12" y1="36" x2="36" y2="36"/>
    
    <line x1="12" y1="12" x2="12" y2="36"/>
    <line x1="18" y1="12" x2="18" y2="36"/>
    <line x1="24" y1="12" x2="24" y2="36"/>
    <line x1="30" y1="12" x2="30" y2="36"/>
    <line x1="36" y1="12" x2="36" y2="36"/>
  </g>
  
  <!-- Colored pixels to represent pixel art -->
  <rect x="12" y="12" width="6" height="6" fill="#FF5722"/>
  <rect x="18" y="12" width="6" height="6" fill="#FF5722"/>
  <rect x="24" y="12" width="6" height="6" fill="#FF5722"/>
  
  <rect x="12" y="18" width="6" height="6" fill="#4CAF50"/>
  <rect x="30" y="18" width="6" height="6" fill="#4CAF50"/>
  
  <rect x="12" y="24" width="6" height="6" fill="#FFEB3B"/>
  <rect x="18" y="24" width="6" height="6" fill="#FFEB3B"/>
  <rect x="24" y="24" width="6" height="6" fill="#FFEB3B"/>
  <rect x="30" y="24" width="6" height="6" fill="#FFEB3B"/>
  
  <rect x="18" y="30" width="6" height="6" fill="#9C27B0"/>
  <rect x="24" y="30" width="6" height="6" fill="#9C27B0"/>
  
  <!-- Time indicator (clock hands) -->
  <g stroke="#fff" stroke-width="2" stroke-linecap="round">
    <line x1="40" y1="32" x2="40" y2="28"/>
    <line x1="40" y1="32" x2="42" y2="30"/>
  </g>
</svg>